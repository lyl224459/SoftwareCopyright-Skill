name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-docx

      - name: Syntax check
        run: |
          python -m py_compile software-copyright-materials/scripts/*.py
          echo "All scripts OK"

      - name: Set release version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          ARCHIVE_NAME="software-copyright-materials-${{ steps.version.outputs.tag }}"
          mkdir -p release/$ARCHIVE_NAME
          cp -R software-copyright-materials release/$ARCHIVE_NAME/
          cp -R skills release/$ARCHIVE_NAME/
          cp -R docs release/$ARCHIVE_NAME/
          cp .claude-plugin/plugin.json release/$ARCHIVE_NAME/
          cp README.md LICENSE release/$ARCHIVE_NAME/
          cd release
          tar czf ../$ARCHIVE_NAME.tar.gz $ARCHIVE_NAME
          zip -r ../$ARCHIVE_NAME.zip $ARCHIVE_NAME
          cd ..

      - name: Generate changelog
        run: |
          echo "## Changes in ${{ steps.version.outputs.tag }}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo HEAD^)..HEAD >> CHANGELOG.md 2>/dev/null || echo "- Initial release" >> CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body_path: CHANGELOG.md
          files: |
            software-copyright-materials-${{ steps.version.outputs.tag }}.tar.gz
            software-copyright-materials-${{ steps.version.outputs.tag }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
